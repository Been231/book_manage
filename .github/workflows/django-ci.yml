name: Django CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create .env file
      run: |
        echo "SECRET_KEY=django-insecure-test-key-${{ github.run_id }}" > .env
        echo "DEBUG=True" >> .env
        echo "ALLOWED_HOSTS=*" >> .env
        echo "DB_ENGINE=django.db.backends.sqlite3" >> .env
        echo "DB_NAME=db_test.sqlite3" >> .env
    
    - name: Run migrations
      run: |
        python manage.py migrate
    
    - name: Run tests
      run: |
        python manage.py test book --verbosity=2
    
    - name: Check code style (flake8)
      run: |
        pip install flake8
        flake8 book --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 book --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true

