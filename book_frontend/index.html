<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">📚 Book Management</span>
    <button class="btn btn-outline-light btn-sm" onclick="handleLogout()">Logout</button>
</nav>

<div class="container">
    <div class="filter-section">
        <h6 class="mb-3 fw-bold">🔍 Tim kiem & Filter</h6>
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label mb-1">Title</label>
                <input type="text" id="filter-title" class="form-control" placeholder="Nhap ten sach...">
            </div>
            <div class="col-md-4">
                <label class="form-label mb-1">Author</label>
                <input type="text" id="filter-author" class="form-control" placeholder="Nhap ten tac gia...">
            </div>
            <div class="col-md-4 d-flex gap-2">
                <button class="btn btn-primary w-50" onclick="applyFilter()">Search</button>
                <button class="btn btn-secondary w-50" onclick="resetFilter()">Reset</button>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 fw-bold">📋 Danh sach sach</h5>
            <div class="d-flex align-items-center gap-3">
                <select class="form-select form-select-sm" style="width:130px" onchange="changePageSize(this.value)">
                    <option value="20">20 / trang</option>
                    <option value="100">100 / trang</option>
                </select>
                <button class="btn btn-success btn-sm" onclick="showAddForm()">+ Add Book</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr><th>ID</th><th>Title</th><th>Author</th><th>Price</th><th>Quantity</th><th>Action</th></tr>
                </thead>
                <tbody id="book-table-body">
                    <tr><td colspan="6" class="text-center">Dang tai...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-2">
            <button id="btn-prev" class="btn btn-outline-secondary btn-sm" onclick="goToPrevPage()">← Previous</button>
            <span id="page-info">Trang 1</span>
            <button id="btn-next" class="btn btn-outline-secondary btn-sm" onclick="goToNextPage()">Next →</button>
        </div>
    </div>
</div>

<!-- Modal Add -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">➕ Them sach moi</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="add-form">
                    <div class="mb-3"><label class="form-label">Title</label><input type="text" id="add-title" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Author</label><input type="text" id="add-author" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Price</label><input type="number" id="add-price" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Quantity</label><input type="number" id="add-quantity" class="form-control"></div>
                    <p id="add-error" class="text-danger mb-0"></p>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" onclick="submitAddBook()">Add Book</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Detail -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">📖 Chi tiet sach</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <table class="table table-bordered">
                    <tr><th>ID</th><td id="detail-id"></td></tr>
                    <tr><th>Title</th><td id="detail-title"></td></tr>
                    <tr><th>Author</th><td id="detail-author"></td></tr>
                    <tr><th>Price</th><td id="detail-price"></td></tr>
                    <tr><th>Quantity</th><td id="detail-quantity"></td></tr>
                </table>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
        </div>
    </div>
</div>

<!-- Modal Edit -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">✏️ Chinh sua sach</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">Title</label><input type="text" id="edit-title" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Author</label><input type="text" id="edit-author" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Price</label><input type="number" id="edit-price" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Quantity</label><input type="number" id="edit-quantity" class="form-control"></div>
                <p id="edit-error" class="text-danger mb-0"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-warning" onclick="submitEditBook()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Delete -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">🗑️ Xac nhan xoa</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">Ban co chac muon xoa sach <strong id="delete-book-title"></strong> khong?</div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Huy</button>
                <button class="btn btn-danger" onclick="submitDelete()">Xoa</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/bookList.js"></script>
<script src="js/bookFilter.js"></script>
<script src="js/bookAdd.js"></script>
<script src="js/bookDetail.js"></script>
<script src="js/bookEdit.js"></script>
<script src="js/bookDelete.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    else loadBooks();
    
    async function handleLogout() {
        if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
            await logout();
        }
    }
</script>
</body>
</html>
