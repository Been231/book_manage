<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; }
        .login-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-card card p-4 shadow">
    <h4 class="text-center mb-4 fw-bold">📚 Book Management</h4>
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Nhap username">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Nhap password" onkeydown="if(event.key==='Enter') submitLogin()">
    </div>
    <p id="login-error" class="text-danger text-center mb-2"></p>
    <button class="btn btn-primary w-100" onclick="submitLogin()">Login</button>
</div>
<script src="js/api.js"></script>
<script>
    if (isLoggedIn()) window.location.href = 'index.html';
    async function submitLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('login-error');
        if (!username || !password) { errorEl.textContent = 'Vui long nhap day du thong tin!'; return; }
        const result = await login(username, password);
        if (result.success) window.location.href = 'index.html';
        else errorEl.textContent = result.message;
    }
</script>
</body>
</html>
